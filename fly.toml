# Fly.io deploy config for Post Train.
# `fly launch --copy-config --no-deploy` will offer to overwrite this — keep
# the http_service section below when it does.

app = "post-train"
primary_region = "iad"

[build]

[env]
PORT = "3000"

[http_service]
internal_port = 3000
force_https = true
# Scheduled posts need the process alive even with no HTTP traffic, so this
# app can't scale-to-zero like a typical stateless web service.
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
